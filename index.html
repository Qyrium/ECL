<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eryn's Chinese Study Tool — P6 华文</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4; --surface: #ffffff; --surface2: #f3f0ea;
    --border: #e2ddd4; --border2: #ccc7bc;
    --text: #1a1814; --text2: #6b6560; --text3: #a09b94;
    --accent: #c4390a; --accent-bg: #fdf0ec;
    --green: #2d7a4f; --green-bg: #edf7f2;
    --amber: #a06010; --amber-bg: #fdf5e6;
    --l1: #2563a8; --l2: #7c3aed; --l3: #b45309;
    --l4: #0e7490; --l5: #15803d; --l6: #be185d;
    --radius: 10px; --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 600; color: var(--accent); }
  .logo span { color: var(--text); }
  .header-meta { font-size: 12px; color: var(--text3); margin-left: auto; text-align: right; }

  .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }

  .nav-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 5px; margin-bottom: 2rem; flex-wrap: wrap; }
  .nav-tab { flex: 1; min-width: 90px; padding: 9px 12px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; white-space: nowrap; }
  .nav-tab:hover { background: var(--surface2); color: var(--text); }
  .nav-tab.active { background: var(--accent); color: #fff; }

  .section { display: none; }
  .section.active { display: block; }

  .lesson-switcher { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .lbtn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px; background: var(--surface); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text2); transition: all 0.15s; }
  .lbtn:hover { border-color: var(--border2); color: var(--text); }
  .lbtn.active { color: #fff; border-color: transparent; }
  .lbtn.all.active { background: var(--text); }
  .lbtn.l1.active { background: var(--l1); }
  .lbtn.l2.active { background: var(--l2); }
  .lbtn.l3.active { background: var(--l3); }
  .lbtn.l4.active { background: var(--l4); }
  .lbtn.l5.active { background: var(--l5); }
  .lbtn.l6.active { background: var(--l6); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }

  .prog-wrap { height: 3px; background: var(--surface2); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  .flashcard-scene { perspective: 900px; margin-bottom: 1.25rem; }
  .flashcard { width: 100%; min-height: 200px; position: relative; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-lg); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; min-height: 200px; }
  .fc-front { background: var(--surface); }
  .fc-back { background: var(--surface2); transform: rotateY(180deg); }
  .fc-char { font-family: 'Noto Serif SC', serif; font-size: 52px; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; letter-spacing: 0.05em; text-align: center; }
  .fc-tap-hint { font-size: 12px; color: var(--text3); margin-top: 0.75rem; }
  .fc-pinyin { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--accent); margin-bottom: 0.75rem; }
  .fc-meaning { font-size: 20px; font-weight: 500; color: var(--text); text-align: center; }
  .fc-lesson-tag { font-size: 11px; color: var(--text3); margin-top: 1rem; font-family: 'DM Mono', monospace; }

  .fc-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .fc-nav button, .btn { padding: 9px 20px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); transition: all 0.12s; }
  .fc-nav button:hover, .btn:hover { border-color: var(--border2); background: var(--surface2); }
  .fc-counter { flex: 1; text-align: center; font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .action-row { display: flex; gap: 10px; justify-content: center; }
  .btn-know { background: var(--green-bg); border-color: #b2dfc8; color: var(--green); font-weight: 500; }
  .btn-know:hover { background: #d6f0e4; }
  .btn-review { background: var(--amber-bg); border-color: #f0d9b0; color: var(--amber); font-weight: 500; }
  .btn-review:hover { background: #faefd0; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; text-align: center; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }

  .quiz-char { font-family: 'Noto Serif SC', serif; font-size: 52px; font-weight: 600; text-align: center; margin: 1rem 0 0.5rem; color: var(--text); letter-spacing: 0.05em; }
  .quiz-meaning { font-size: 14px; color: var(--text3); text-align: center; margin-bottom: 1.5rem; font-style: italic; }
  .quiz-input { width: 100%; padding: 12px 16px; font-size: 18px; font-family: 'DM Mono', monospace; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); text-align: center; outline: none; transition: border-color 0.15s; }
  .quiz-input:focus { border-color: var(--accent); }
  .quiz-feedback { margin: 1rem 0 0; padding: 10px 14px; border-radius: var(--radius); text-align: center; font-size: 15px; font-weight: 500; display: none; }
  .quiz-feedback.correct { background: var(--green-bg); color: var(--green); display: block; border: 1px solid #b2dfc8; }
  .quiz-feedback.wrong { background: #fef2f2; color: #b91c1c; display: block; border: 1px solid #fecaca; }
  .quiz-btns { display: flex; gap: 10px; margin-top: 1.25rem; justify-content: center; }

  .cloze-lesson-header { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin: 1.5rem 0 0.75rem; }
  .cloze-lesson-header:first-child { margin-top: 0; }
  .cloze-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; }
  .cloze-text { font-family: 'Noto Serif SC', serif; font-size: 18px; line-height: 2.8; color: var(--text); }
  .cloze-inp { font-family: 'Noto Serif SC', serif; font-size: 18px; border: none; border-bottom: 2px solid var(--border2); background: transparent; color: var(--text); outline: none; text-align: center; padding: 0 4px; transition: border-color 0.15s; min-width: 60px; }
  .cloze-inp:focus { border-color: var(--accent); }
  .cloze-inp.correct { border-color: var(--green); color: var(--green); }
  .cloze-inp.wrong { border-color: #b91c1c; color: #b91c1c; }
  .cloze-btns { display: flex; gap: 10px; margin-top: 1.5rem; }

  .wl-lesson-header { display: flex; align-items: baseline; gap: 10px; margin: 1.5rem 0 1rem; }
  .wl-lesson-header:first-child { margin-top: 0; }
  .wl-lesson-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .wl-lesson-sub { font-size: 12px; color: var(--text3); }
  .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .word-chip { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; transition: all 0.15s; }
  .word-chip:hover { border-color: var(--border2); }
  .wc-char { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 600; color: var(--text); }
  .wc-pinyin { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); margin: 2px 0; }
  .wc-meaning { font-size: 11px; color: var(--text3); }
  .word-chip.is-known { opacity: 0.4; }
  .word-chip.is-review { border-left: 3px solid var(--amber); }

  .prog-lesson-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; }
  .plc-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .plc-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .plc-pct { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text3); }
  .plc-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .plc-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .l1-fill{background:var(--l1)} .l2-fill{background:var(--l2)} .l3-fill{background:var(--l3)}
  .l4-fill{background:var(--l4)} .l5-fill{background:var(--l5)} .l6-fill{background:var(--l6)}
  .plc-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text3); flex-wrap: wrap; }

  .review-section { margin-top: 1.5rem; }
  .review-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
  .review-group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin: 1rem 0 0.5rem; }
  .review-item { display: flex; align-items: baseline; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; flex-wrap: wrap; }
  .review-item:last-child { border-bottom: none; }
  .ri-char { font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 600; min-width: 120px; }
  .ri-py { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }
  .ri-en { font-size: 12px; color: var(--text3); }

  .btn-danger { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
  .btn-danger:hover { background: #fee2e2; }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    .container { padding: 1rem; }
    .nav-tab { font-size: 12px; padding: 8px 8px; min-width: 60px; }
    .fc-char { font-size: 36px; }
    .quiz-char { font-size: 38px; }
    .cloze-text { font-size: 16px; }
    .cloze-inp { font-size: 16px; }
    .stats-row { gap: 6px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">华文 <span>学习</span></div>
  <div class="header-meta">
    <div>Eryn · 圣婴女子小学</div>
    <div>小六 6A — Lessons 1–6</div>
  </div>
</header>

<div class="container">

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('flashcards')">📇 Flashcards</button>
    <button class="nav-tab" onclick="switchTab('quiz')">✏️ Pinyin quiz</button>
    <button class="nav-tab" onclick="switchTab('cloze')">📝 Fill in blanks</button>
    <button class="nav-tab" onclick="switchTab('wordlist')">📖 Word list</button>
    <button class="nav-tab" onclick="switchTab('progress')">📊 Progress</button>
  </div>

  <!-- FLASHCARDS -->
  <div id="sec-flashcards" class="section active">
    <div class="lesson-switcher" id="fc-lswitcher">
      <button class="lbtn all active" onclick="fcSetLesson('all',this)">All</button>
      <button class="lbtn l1" onclick="fcSetLesson('1',this)">L1</button>
      <button class="lbtn l2" onclick="fcSetLesson('2',this)">L2</button>
      <button class="lbtn l3" onclick="fcSetLesson('3',this)">L3</button>
      <button class="lbtn l4" onclick="fcSetLesson('4',this)">L4</button>
      <button class="lbtn l5" onclick="fcSetLesson('5',this)">L5</button>
      <button class="lbtn l6" onclick="fcSetLesson('6',this)">L6</button>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="fc-prog" style="width:0%"></div></div>
    <div class="flashcard-scene">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="fc-face fc-front">
          <div class="fc-char" id="fc-char">—</div>
          <div class="fc-tap-hint">tap to reveal →</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-pinyin" id="fc-pinyin"></div>
          <div class="fc-meaning" id="fc-meaning"></div>
          <div class="fc-lesson-tag" id="fc-lesson-tag"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="fcNav(-1)">← prev</button>
      <span class="fc-counter" id="fc-counter"></span>
      <button onclick="fcNav(1)">next →</button>
    </div>
    <div class="action-row">
      <button class="btn btn-know" onclick="markKnown()">Know it ✓</button>
      <button class="btn btn-review" onclick="markReview()">Review again ↺</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="sec-quiz" class="section">
    <div class="lesson-switcher" id="q-lswitcher">
      <button class="lbtn all active" onclick="qSetLesson('all',this)">All</button>
      <button class="lbtn l1" onclick="qSetLesson('1',this)">L1</button>
      <button class="lbtn l2" onclick="qSetLesson('2',this)">L2</button>
      <button class="lbtn l3" onclick="qSetLesson('3',this)">L3</button>
      <button class="lbtn l4" onclick="qSetLesson('4',this)">L4</button>
      <button class="lbtn l5" onclick="qSetLesson('5',this)">L5</button>
      <button class="lbtn l6" onclick="qSetLesson('6',this)">L6</button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">score</div><div class="stat-value" id="q-score">0</div></div>
      <div class="stat-card"><div class="stat-label">streak</div><div class="stat-value" id="q-streak">0</div></div>
      <div class="stat-card"><div class="stat-label">done</div><div class="stat-value" id="q-done" style="font-size:18px;padding-top:5px;">0/0</div></div>
    </div>
    <div class="card">
      <p style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;">Type the pinyin for:</p>
      <div class="quiz-char" id="q-char">—</div>
      <div class="quiz-meaning" id="q-meaning"></div>
      <input class="quiz-input" id="q-input" placeholder="e.g. hǎo or hao3" onkeydown="if(event.key==='Enter')checkQuiz()" autocomplete="off" />
      <div class="quiz-feedback" id="q-feedback"></div>
      <div class="quiz-btns">
        <button class="btn" onclick="checkQuiz()">Check</button>
        <button class="btn" onclick="skipQuiz()">Skip →</button>
      </div>
    </div>
  </div>

  <!-- CLOZE -->
  <div id="sec-cloze" class="section">
    <div class="lesson-switcher" id="cloze-lswitcher">
      <button class="lbtn all active" onclick="clozeSetLesson('all',this)">All</button>
      <button class="lbtn l1" onclick="clozeSetLesson('1',this)">L1</button>
      <button class="lbtn l2" onclick="clozeSetLesson('2',this)">L2</button>
      <button class="lbtn l3" onclick="clozeSetLesson('3',this)">L3</button>
      <button class="lbtn l4" onclick="clozeSetLesson('4',this)">L4</button>
      <button class="lbtn l5" onclick="clozeSetLesson('5',this)">L5</button>
      <button class="lbtn l6" onclick="clozeSetLesson('6',this)">L6</button>
    </div>
    <div id="cloze-container"></div>
    <div class="cloze-btns">
      <button class="btn" onclick="checkCloze()">Check answers</button>
      <button class="btn" onclick="resetCloze()">Reset</button>
    </div>
  </div>

  <!-- WORD LIST -->
  <div id="sec-wordlist" class="section">
    <div class="lesson-switcher" id="wl-lswitcher">
      <button class="lbtn all active" onclick="wlSetLesson('all',this)">All</button>
      <button class="lbtn l1" onclick="wlSetLesson('1',this)">L1</button>
      <button class="lbtn l2" onclick="wlSetLesson('2',this)">L2</button>
      <button class="lbtn l3" onclick="wlSetLesson('3',this)">L3</button>
      <button class="lbtn l4" onclick="wlSetLesson('4',this)">L4</button>
      <button class="lbtn l5" onclick="wlSetLesson('5',this)">L5</button>
      <button class="lbtn l6" onclick="wlSetLesson('6',this)">L6</button>
    </div>
    <div id="wl-container"></div>
  </div>

  <!-- PROGRESS -->
  <div id="sec-progress" class="section">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">known</div><div class="stat-value" id="p-known">0</div></div>
      <div class="stat-card"><div class="stat-label">reviewing</div><div class="stat-value" id="p-reviewing">0</div></div>
      <div class="stat-card"><div class="stat-label">total</div><div class="stat-value" id="p-total">0</div></div>
    </div>
    <div id="p-lessons"></div>
    <div class="review-section">
      <div class="review-title">Words to review</div>
      <div id="review-list"></div>
    </div>
    <div style="margin-top:1.5rem;">
      <button class="btn btn-danger" onclick="resetProgress()">Reset all progress</button>
    </div>
  </div>

</div>

<script>
const LESSON_TITLES = {
  '1':'第一课 — 加油！加油！',
  '2':'第二课 — 祖孙情',
  '3':'第三课 — 美食小侦探',
  '4':'第四课 — 宝贵的礼物',
  '5':'第五课 — 小故事，大道理',
  '6':'第六课 — 精彩三国',
};

const vocab = {
  '1':[
    {char:'好榜样',       pinyin:'hǎo bǎng yàng',           meaning:'good role model'},
    {char:'锻炼身体',     pinyin:'duàn liàn shēn tǐ',       meaning:'exercise the body'},
    {char:'景色优美',     pinyin:'jǐng sè yōu měi',         meaning:'beautiful scenery'},
    {char:'实现梦想',     pinyin:'shí xiàn mèng xiǎng',     meaning:'realise a dream'},
    {char:'勤奋学习',     pinyin:'qín fèn xué xí',          meaning:'study diligently'},
    {char:'复习功课',     pinyin:'fù xí gōng kè',           meaning:'revise lessons'},
    {char:'改变计划',     pinyin:'gǎi biàn jì huà',         meaning:'change plans'},
    {char:'一阵狂风',     pinyin:'yī zhèn kuáng fēng',      meaning:'a gust of wild wind'},
    {char:'五颜六色',     pinyin:'wǔ yán liù sè',           meaning:'colourful / many colours'},
    {char:'克服困难',     pinyin:'kè fú kùn nán',           meaning:'overcome difficulties'},
    {char:'勇敢面对压力', pinyin:'yǒng gǎn miàn duì yā lì', meaning:'bravely face pressure'},
    {char:'懒惰',         pinyin:'lǎn duò',                 meaning:'lazy'},
    {char:'严格',         pinyin:'yán gé',                  meaning:'strict'},
    {char:'测验',         pinyin:'cè yàn',                  meaning:'test / quiz'},
    {char:'水滴',         pinyin:'shuǐ dī',                 meaning:'water droplet'},
  ],
  '2':[
    {char:'挡住视线',     pinyin:'dǎng zhù shì xiàn',       meaning:'block the line of sight'},
    {char:'踩到果皮',     pinyin:'cǎi dào guǒ pí',          meaning:'step on fruit peel'},
    {char:'了解详情',     pinyin:'liǎo jiě xiáng qíng',     meaning:'understand the details'},
    {char:'交换礼物',     pinyin:'jiāo huàn lǐ wù',         meaning:'exchange gifts'},
    {char:'活动有趣',     pinyin:'huó dòng yǒu qù',         meaning:'activity is interesting'},
    {char:'字体歪斜',     pinyin:'zì tǐ wāi xié',           meaning:'slanted handwriting'},
    {char:'共同进步',     pinyin:'gòng tóng jìn bù',        meaning:'make progress together'},
    {char:'陪伴家人',     pinyin:'péi bàn jiā rén',         meaning:'accompany family'},
    {char:'笑眯眯地回忆', pinyin:'xiào mī mī de huí yì',   meaning:'recall with a smile'},
    {char:'贴心的孙子',   pinyin:'tiē xīn de sūn zi',       meaning:'considerate grandson'},
    {char:'促进',         pinyin:'cù jìn',                  meaning:'promote / foster'},
    {char:'和谐',         pinyin:'hé xié',                  meaning:'harmonious'},
    {char:'拨打',         pinyin:'bō dǎ',                   meaning:'dial (a call)'},
    {char:'迅速',         pinyin:'xùn sù',                  meaning:'quick / rapid'},
  ],
  '3':[
    {char:'例如',         pinyin:'lì rú',                   meaning:'for example'},
    {char:'折断筷子',     pinyin:'zhé duàn kuài zi',        meaning:'break chopsticks'},

const LESSONS = ['1','2','3','4','5','6'];

// ---- state ----
let known = new Set(), reviewAgain = new Set();
function loadState() {
  try {
    const k = localStorage.getItem('eryn_known');
    const r = localStorage.getItem('eryn_review');
    if (k) known = new Set(JSON.parse(k));
    if (r) reviewAgain = new Set(JSON.parse(r));
  } catch(e){}
}
function saveState() {
  try {
    localStorage.setItem('eryn_known', JSON.stringify([...known]));
    localStorage.setItem('eryn_review', JSON.stringify([...reviewAgain]));
  } catch(e){}
}

// ---- utils ----
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function getAllVocab() { return LESSONS.flatMap(l => vocab[l]); }
function getVocab(l) { return l==='all' ? getAllVocab() : vocab[l]; }
function getLessonOf(char) {
  for (const l of LESSONS) { if (vocab[l].find(v=>v.char===char)) return l; }
  return '';
}
function setActiveLbtn(container, btn) {
  container.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function normalise(s) {
  return s.trim().toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e')
    .replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o')
    .replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u')
    .replace(/[1-5]/g,'').replace(/\s+/g,'');
}

// ---- TABS ----
function switchTab(t) {
  const names = ['flashcards','quiz','cloze','wordlist','progress'];
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',names[i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
}

// ---- FLASHCARDS ----
let fcLesson='all', fcList=[], fcIdx=0;
function fcSetLesson(l,btn) {
  fcLesson=l; setActiveLbtn(document.getElementById('fc-lswitcher'),btn);
  fcList=shuffle(getVocab(l)); fcIdx=0; showFC();
}
function showFC() {
  if (!fcList.length) return;
  const item=fcList[fcIdx];
  document.getElementById('fc-char').textContent=item.char;
  document.getElementById('fc-pinyin').textContent=item.pinyin;
  document.getElementById('fc-meaning').textContent=item.meaning;
  document.getElementById('fc-lesson-tag').textContent=LESSON_TITLES[getLessonOf(item.char)]||'';
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fc-counter').textContent=(fcIdx+1)+' / '+fcList.length;
  document.getElementById('fc-prog').style.width=Math.round((fcIdx/fcList.length)*100)+'%';
}
function flipCard(){document.getElementById('flashcard').classList.toggle('flipped');}
function fcNav(d){fcIdx=(fcIdx+d+fcList.length)%fcList.length;showFC();}
function markKnown(){known.add(fcList[fcIdx].char);reviewAgain.delete(fcList[fcIdx].char);saveState();updateProgress();buildWordList();fcNav(1);}
function markReview(){reviewAgain.add(fcList[fcIdx].char);known.delete(fcList[fcIdx].char);saveState();updateProgress();buildWordList();fcNav(1);}

// ---- QUIZ ----
let qLesson='all', qList=[], qIdx=0, qScore=0, qStreak=0, qDone=0;
function qSetLesson(l,btn) {
  qLesson=l; setActiveLbtn(document.getElementById('q-lswitcher'),btn);
  qList=shuffle(getVocab(l)); qIdx=0; qScore=0; qStreak=0; qDone=0;
  updateQStats(); showQuiz();
}
function showQuiz() {
  if (!qList.length) return;
  const item=qList[qIdx%qList.length];
  document.getElementById('q-char').textContent=item.char;
  document.getElementById('q-meaning').textContent=item.meaning;
  document.getElementById('q-input').value='';
  document.getElementById('q-feedback').className='quiz-feedback';
  document.getElementById('q-input').focus();
}
function checkQuiz() {
  const item=qList[qIdx%qList.length];
  const ans=document.getElementById('q-input').value;
  const ok=normalise(ans)===normalise(item.pinyin);
  qDone++; if(ok){qScore++;qStreak++;}else{qStreak=0;}
  const fb=document.getElementById('q-feedback');
  fb.className='quiz-feedback '+(ok?'correct':'wrong');
  fb.textContent=ok?'正确！  '+item.pinyin:'答案是：'+item.pinyin;
  updateQStats();
  setTimeout(()=>{qIdx++;showQuiz();},1600);
}
function skipQuiz(){qIdx++;qDone++;updateQStats();showQuiz();}
function updateQStats(){
  document.getElementById('q-score').textContent=qScore;
  document.getElementById('q-streak').textContent=qStreak;
  document.getElementById('q-done').textContent=qDone+'/'+qList.length;
}

// ---- CLOZE ----
let clozeLesson='all';
function clozeSetLesson(l,btn) {
  clozeLesson=l; setActiveLbtn(document.getElementById('cloze-lswitcher'),btn); buildCloze();
}
function buildCloze() {
  const data=clozeLesson==='all'?clozeData:clozeData.filter(c=>c.lesson===clozeLesson);
  const container=document.getElementById('cloze-container');
  container.innerHTML='';
  let lastLesson='';
  data.forEach(cd=>{
    if(cd.lesson!==lastLesson){
      const h=document.createElement('div');
      h.className='cloze-lesson-header';
      h.textContent=LESSON_TITLES[cd.lesson];
      container.appendChild(h);
      lastLesson=cd.lesson;
    }
    const div=document.createElement('div');
    div.className='cloze-card';
    let text=cd.full;
    cd.blanks.forEach(b=>{
      const w=Math.max(60,b.length*22);
      text=text.replace(b,`<input class="cloze-inp" data-ans="${b}" style="width:${w}px" />`);
    });
    div.innerHTML=`<div class="cloze-text">${text}</div>`;
    container.appendChild(div);
  });
}
function checkCloze(){
  document.querySelectorAll('.cloze-inp').forEach(inp=>{
    inp.classList.remove('correct','wrong');
    if(inp.value.trim()===inp.dataset.ans) inp.classList.add('correct');
    else{inp.classList.add('wrong');inp.placeholder=inp.dataset.ans;}
  });
}
function resetCloze(){
  document.querySelectorAll('.cloze-inp').forEach(inp=>{
    inp.value='';inp.classList.remove('correct','wrong');inp.placeholder='';
  });
}

// ---- WORD LIST ----
let wlLesson='all';
function wlSetLesson(l,btn){
  wlLesson=l; setActiveLbtn(document.getElementById('wl-lswitcher'),btn); buildWordList();
}
function buildWordList(){
  const container=document.getElementById('wl-container');
  container.innerHTML='';
  const lessons=wlLesson==='all'?LESSONS:[wlLesson];
  lessons.forEach(l=>{
    const header=document.createElement('div');
    header.className='wl-lesson-header';
    header.innerHTML=`<span class="wl-lesson-title">${LESSON_TITLES[l]}</span><span class="wl-lesson-sub">${vocab[l].length} words</span>`;
    container.appendChild(header);
    const grid=document.createElement('div');
    grid.className='word-grid';
    vocab[l].forEach(v=>{
      const chip=document.createElement('div');
      chip.className='word-chip'+(known.has(v.char)?' is-known':reviewAgain.has(v.char)?' is-review':'');
      chip.innerHTML=`<div class="wc-char">${v.char}</div><div class="wc-pinyin">${v.pinyin}</div><div class="wc-meaning">${v.meaning}</div>`;
      grid.appendChild(chip);
    });
    container.appendChild(grid);
  });
}

// ---- PROGRESS ----
function updateProgress(){
  document.getElementById('p-known').textContent=known.size;
  document.getElementById('p-reviewing').textContent=reviewAgain.size;
  document.getElementById('p-total').textContent=getAllVocab().length;
  const pl=document.getElementById('p-lessons');
  pl.innerHTML='';
  LESSONS.forEach(l=>{
    const words=vocab[l];
    const k=words.filter(v=>known.has(v.char)).length;
    const r=words.filter(v=>reviewAgain.has(v.char)).length;
    const pct=Math.round((k/words.length)*100);
    const div=document.createElement('div');
    div.className='prog-lesson-card';
    div.innerHTML=`
      <div class="plc-header"><span class="plc-title">${LESSON_TITLES[l]}</span><span class="plc-pct">${pct}%</span></div>
      <div class="plc-bar"><div class="plc-fill l${l}-fill" style="width:${pct}%"></div></div>
      <div class="plc-meta"><span>Known: ${k}/${words.length}</span><span>Reviewing: ${r}</span><span>Unseen: ${words.length-k-r}</span></div>`;
    pl.appendChild(div);
  });
  const rl=document.getElementById('review-list');
  rl.innerHTML='';
  if(reviewAgain.size===0){
    rl.innerHTML='<p style="font-size:14px;color:var(--text3);">No words marked for review yet.</p>';
    return;
  }
  LESSONS.forEach(l=>{
    const items=vocab[l].filter(v=>reviewAgain.has(v.char));
    if(!items.length) return;
    const lbl=document.createElement('div');
    lbl.className='review-group-label';
    lbl.textContent=LESSON_TITLES[l];
    rl.appendChild(lbl);
    items.forEach(v=>{
      const row=document.createElement('div');
      row.className='review-item';
      row.innerHTML=`<span class="ri-char">${v.char}</span><span class="ri-py">${v.pinyin}</span><span class="ri-en">${v.meaning}</span>`;
      rl.appendChild(row);
    });
  });
}
function resetProgress(){
  if(!confirm('Reset all progress? This will clear your known and review lists.')) return;
  known.clear();reviewAgain.clear();saveState();updateProgress();buildWordList();
}

// ---- INIT ----
loadState();
fcList=shuffle(getAllVocab()); showFC();
qList=shuffle(getAllVocab()); updateQStats(); showQuiz();
buildCloze(); buildWordList(); updateProgress();
</script>
